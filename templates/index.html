<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starlink Usage Scraper</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        background:linear-gradient(135deg,#050505,#101010);
        color:#fff;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:'Segoe UI',sans-serif;
        padding:20px;
    }

    .dashboard{
        width:100%;
        max-width:900px;
        background:rgba(255,255,255,0.03);
        border:1px solid rgba(255,255,255,0.08);
        backdrop-filter:blur(10px);
        border-radius:20px;
        padding:35px;
        box-shadow:0 0 30px rgba(255,255,255,0.05);
    }

    .logo{
        font-size:2rem;
        font-weight:700;
        letter-spacing:1px;
    }

    .subtitle{
        color:#9ca3af;
        margin-top:5px;
    }

    .divider{
        border-color:#2b2b2b;
        margin:25px 0;
    }

    .info-box{
        background:#111;
        border:1px solid #222;
        padding:15px;
        border-radius:12px;
        margin-bottom:25px;
    }

    .info-box p{
        margin:0;
        color:#9ca3af;
        font-size:.9rem;
    }

    .btn-starlink{
        background:#fff;
        color:#000;
        border:none;
        border-radius:12px;
        font-weight:600;
        padding:14px;
        transition:.3s;
    }

    .btn-starlink:hover{
        transform:translateY(-2px);
        background:#e5e5e5;
    }

    .btn-download{
        border-radius:12px;
        padding:12px;
    }

    #loader{
        margin-top:40px;
    }

    .spinner-border{
        width:3rem;
        height:3rem;
    }

    .table-container{
        margin-top:25px;
        background:#0d0d0d;
        border:1px solid #222;
        border-radius:15px;
        overflow:hidden;
    }

    .table{
        margin:0;
    }

    .table thead{
        background:#171717;
    }

    .table th{
        border:none;
        padding:15px;
    }

    .table td{
        padding:14px;
        border-color:#222;
    }

    .table tbody tr:hover{
        background:#161616;
    }

    .status-pill{
        display:inline-block;
        padding:6px 12px;
        background:#111;
        border:1px solid #2a2a2a;
        border-radius:30px;
        color:#aaa;
        font-size:.8rem;
        margin-top:10px;
    }
</style>
</head>

<body>

<div class="dashboard">

    <div class="d-flex justify-content-between align-items-center flex-wrap">
        <div>
            <h1 class="logo">STARLINK LAB</h1>
            <p class="subtitle">Daily Data Usage History Extractor</p>
        </div>

        <span class="status-pill">READY</span>
    </div>

    <hr class="divider">

    <div class="info-box">
        <p>
            Configuration is automatically loaded from the server environment.
        </p>
    </div>

    <button id="btn" class="btn btn-starlink w-100">
        🚀 Start Data Collection
    </button>

    <a href="/download"
       id="dl"
       class="btn btn-outline-light btn-download w-100 mt-3 d-none">
       💾 Download CSV
    </a>

    <div id="loader" class="text-center d-none">
        <div class="spinner-border text-light"></div>
        <h5 class="mt-3">Collecting Starlink Usage Data</h5>
        <p class="text-secondary">
            Please wait while historical records are being retrieved...
        </p>
    </div>

    <div id="results" class="d-none">
        <div class="table-container">
            <table class="table table-dark align-middle">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Data Usage (GB)</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
document.getElementById('btn').onclick = function() {
    const btn = this;
    btn.disabled = true;

    document.getElementById('loader').classList.remove('d-none');
    document.getElementById('results').classList.add('d-none');

    fetch('/scrape')
        .then(r => r.json())
        .then(res => {
            document.getElementById('loader').classList.add('d-none');

            if(res.status === 'success') {
                const b = document.getElementById('tbody');
                b.innerHTML = '';

                res.data.forEach(item => {
                    b.innerHTML += `
                        <tr>
                            <td>${item.Date}</td>
                            <td>${item['Data Usage (GB)']} GB</td>
                        </tr>
                    `;
                });

                document.getElementById('results').classList.remove('d-none');
                document.getElementById('dl').classList.remove('d-none');
            } else {
                alert("Error: " + res.message);
            }

            btn.disabled = false;
        })
        .catch(err => {
            alert("Server error: " + err);
            btn.disabled = false;
            document.getElementById('loader').classList.add('d-none');
        });
};
</script>

</body>
</html>
